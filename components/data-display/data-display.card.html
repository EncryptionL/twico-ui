  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }

<div id="root"></div>
<script type="text/babel">

  function Demo() {
    return (

          <Avatar name="Ada Park" size="sm" status="away" />

        <div className="row">

          <Badge tone="warning" variant="solid">Pending</Badge>
          <Badge tone="danger" variant="outline">Error</Badge>
          <Badge tone="info">Info</Badge>
          <Badge tone="neutral">Draft</Badge>
        </div>
        <div className="row">
          <span className="lbl">Tags</span>
          <Tag leftIcon={<Icon name="Hash" size={13} />}>design-system</Tag>

          <Tag onRemove={() => {}}>TailwindCSS</Tag>
