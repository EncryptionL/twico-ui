<!-- @dsCard group="Components" viewport="700x320" name="Chart" subtitle="SVG bar & line charts — multi-series, animated, no deps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chart — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 18px; }
  h3 { margin: 0 0 14px; font-size: var(--text-sm); font-weight: 700; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Chart } = window.TwicoUiDesignSystem_f2f16a;
  function Demo() {
    const bars = [
      { label: "Mon", value: 2400 }, { label: "Tue", value: 3100 }, { label: "Wed", value: 2800 },
      { label: "Thu", value: 4200 }, { label: "Fri", value: 3600 }, { label: "Sat", value: 1500 }, { label: "Sun", value: 1900 },
    ];
    const lines = [
      { label: "Jan", signups: 120, active: 80 }, { label: "Feb", signups: 180, active: 140 },
      { label: "Mar", signups: 240, active: 190 }, { label: "Apr", signups: 220, active: 210 },
      { label: "May", signups: 320, active: 260 }, { label: "Jun", signups: 410, active: 330 },
    ];
    return (
      <div className="grid">
        <div className="card"><h3>Revenue this week</h3><Chart type="bar" data={bars} valueFormat={(v) => "$" + v.toLocaleString()} /></div>
        <div className="card"><h3>Signups vs Active</h3><Chart type="line" series={["signups","active"]} showLegend data={lines} /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
