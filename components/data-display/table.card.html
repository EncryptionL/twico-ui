<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Table — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .foot small { color: var(--color-text-subtle); font-size: var(--text-xs); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Table, Pagination, Badge, Avatar } = window.TwicoUiDesignSystem_f2f16a;

  const users = [
    { id: 1, name: "Jane Cooper", role: "Admin", status: "Active", mrr: "$120" },
    { id: 2, name: "Wade Warren", role: "Editor", status: "Active", mrr: "$48" },
    { id: 3, name: "Esther Howard", role: "Viewer", status: "Invited", mrr: "$0" },
    { id: 4, name: "Cameron Lee", role: "Editor", status: "Suspended", mrr: "$48" },
  ];
  const toneFor = (s) => s === "Active" ? "success" : s === "Invited" ? "info" : "danger";

  function Demo() {
    const [page, setPage] = React.useState(3);
    return (
      <div>
        <Table
          sortable hover
          rowKey={(r) => r.id}
          selectedKeys={[2]}
          columns={[
            { key: "name", header: "Name", render: (v) => (
              <span style={{display:"inline-flex",alignItems:"center",gap:10}}>
                <Avatar name={v} size="sm" /> <strong style={{fontWeight:600}}>{v}</strong>
              </span>) },
            { key: "role", header: "Role" },
            { key: "status", header: "Status", render: (v) => <Badge tone={toneFor(v)} dot>{v}</Badge> },
            { key: "mrr", header: "MRR", align: "right" },
          ]}
          data={users}
        />
        <div className="foot">
          <small>Showing 1–4 of 96 members</small>
          <Pagination page={page} total={12} onChange={setPage} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
