<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Avatar menu — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../assets/twico-icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 26px; font-family: var(--font-sans); min-height: 320px; }
  .bar { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
  .lbl { font-size: var(--text-xs); font-weight: 600; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-text-subtle); margin-bottom: 12px; }
  .panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { AvatarMenu } = window.TwicoUiDesignSystem_f2f16a;
  const Icon = window.TwicoIcon;
  function Demo() {
    const items = [
      { label: "View profile", icon: <Icon name="User" size={16} /> },
      { label: "Account settings", icon: <Icon name="Settings" size={16} />, shortcut: "⌘," },
      { label: "Billing", icon: <Icon name="CreditCard" size={16} /> },
      { separator: true },
      { label: "Theme", heading: true },
      { label: "Switch to dark", icon: <Icon name="Moon" size={16} /> },
      { separator: true },
      { label: "Sign out", icon: <Icon name="LogOut" size={16} />, danger: true },
    ];
    return (
      <div className="bar">
        <div>
          <div className="lbl">Avatar only (navbar)</div>
          <AvatarMenu name="Ada Park" email="ada@twico.dev" status="online" items={items} />
        </div>
        <div>
          <div className="lbl">With name (sidebar)</div>
          <div className="panel">
            <AvatarMenu name="Ada Park" email="ada@twico.dev" status="online" showName align="start" items={items} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
