<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Toggles — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-size: var(--text-xs); font-weight: 600; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-text-subtle); margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Checkbox, Radio, Switch } = window.TwicoUiDesignSystem_f2f16a;

  function Demo() {
    return (
      <div className="grid">
        <div className="stack">
          <span className="lbl">Checkbox</span>
          <Checkbox label="Subscribe to updates" defaultChecked />
          <Checkbox label="Select all" indeterminate />
          <Checkbox label="Notifications" description="Email me about activity" />
          <Checkbox label="Disabled" disabled />
        </div>
        <div className="stack">
          <span className="lbl">Radio</span>
          <Radio name="plan" label="Free plan" defaultChecked />
          <Radio name="plan" label="Pro plan" description="$12 / month" />
          <Radio name="plan" label="Team plan" description="$29 / month" />
          <Radio name="plan" label="Disabled" disabled />
        </div>
        <div className="stack">
          <span className="lbl">Switch</span>
          <Switch label="Enable dark mode" defaultChecked />
          <Switch label="Auto-save" description="Save changes as you type" defaultChecked />
          <Switch label="Beta features" />
          <Switch label="Disabled" disabled />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
