<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Date picker — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); min-height: 400px; }
  .row { display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap; }
  .col { width: 240px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DatePicker } = window.TwicoUiDesignSystem_f2f16a;
  function Demo() {
    const [a, setA] = React.useState(new Date());
    const [b, setB] = React.useState(null);
    return (
      <div className="row">
        <div className="col"><DatePicker label="Start date" value={a} onChange={setA} weekStartsOn={1} /></div>
        <div className="col"><DatePicker label="Deadline (future only)" value={b} onChange={setB} min={new Date()} placeholder="Pick a day" /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
