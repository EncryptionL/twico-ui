<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color picker — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); min-height: 320px; }
  .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .col { width: 220px; }
  .preview { margin-top: 14px; height: 60px; border-radius: var(--radius-lg); display: grid; place-items: center; color: #fff; font-weight: 700; font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ColorPicker } = window.TwicoUiDesignSystem_f2f16a;
  function Demo() {
    const [c, setC] = React.useState("#6366F1");
    return (
      <div className="row">
        <div className="col">
          <ColorPicker label="Brand color" value={c} onChange={setC} />
          <div className="preview" style={{ background: c }}>{c}</div>
        </div>
        <div className="col">
          <ColorPicker label="Accent (teal default)" defaultValue="#14B8A6" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
