<!-- @dsCard group="Components" viewport="700x230" name="Currency inputs" subtitle="Fixed currency (symbol + code, precision-enforced) and user-selectable currency" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Currency — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; align-items: start; }
  .lbl { font-size: var(--text-xs); font-weight: 600; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-text-subtle); margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Currency, CurrencyField } = window.TwicoUiDesignSystem_f2f16a;

  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="lbl">Fixed currency (defined in code)</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Currency label="Price (USD)" currency="USD" defaultValue="1299.5" hint="2 decimals — typing a 3rd is rejected" />
            <Currency label="Harga (IDR)" currency="IDR" defaultValue="250000" />
            <Currency label="Total (JPY)" currency="JPY" defaultValue="9800" hint="0 decimals" />
          </div>
        </div>
        <div>
          <div className="lbl">User-selectable currency</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <CurrencyField label="Amount" defaultCurrency="USD" defaultValue="49.99" hint="Pick any currency — searchable" />
            <CurrencyField label="Budget" defaultCurrency="EUR" defaultValue="1500" currencies={["USD","EUR","GBP","IDR","JPY"]} hint="Limited choices" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
