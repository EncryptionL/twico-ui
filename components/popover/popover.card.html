<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Popover — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../assets/twico-icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 40px 24px; font-family: var(--font-sans); }
  .bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Popover, Button, IconButton, Input, Avatar } = window.TwicoUiDesignSystem_f2f16a;
  const Icon = window.TwicoIcon;
  function Demo() {
    return (
      <div className="bar">
        <Popover placement="bottom" align="start" width={260}
          title="Share link"
          trigger={<Button variant="outline" leftIcon={<Icon name="Share2" size={16} />}>Share</Button>}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Input defaultValue="https://twico.dev/p/9f2" />
            <Button fullWidth leftIcon={<Icon name="Copy" size={15} />}>Copy link</Button>
          </div>
        </Popover>

        <Popover placement="bottom" align="center" width={240}
          trigger={<IconButton aria-label="Help" variant="soft" icon={<Icon name="Info" />} />}>
          Twico UI popovers render in a portal, so they’re never clipped by overflow and flip when near an edge.
        </Popover>

        <Popover placement="right" width={220}
          trigger={<Button variant="ghost" leftIcon={<Avatar name="Ada Park" size="xs" />}>Account</Button>}>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <strong style={{ color: "var(--color-text)" }}>Ada Park</strong>
            <span>ada@twico.dev</span>
          </div>
        </Popover>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
