<!DOCTYPE html>

<head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 26px; font-family: var(--font-sans); min-height: 320px; }
  .bar { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Menu, Button, IconButton, Avatar } = window.TwicoUiDesignSystem_f2f16a;
  const Icon = window.TwicoIcon;
  function Demo() {
    const acct = [
      { label: "Account", heading: true },
      { label: "Profile", icon: <Icon name="User" size={16} />, shortcut: "⌘P" },
      { label: "Settings", icon: <Icon name="Settings" size={16} />, shortcut: "⌘," },
      { label: "Keyboard shortcuts", icon: <Icon name="Keyboard" size={16} />, disabled: true },
      { separator: true },
      { label: "Sign out", icon: <Icon name="LogOut" size={16} />, danger: true },
    ];
    return (
      <div className="bar">
        <Menu align="start" trigger={<Button variant="outline" rightIcon={<Icon name="ChevronDown" size={15} />}>Options</Button>} items={acct} />
        <Menu align="end" trigger={<IconButton aria-label="More" variant="ghost" icon={<Icon name="EllipsisVertical" />} />} items={[
          { label: "Edit", icon: <Icon name="Pencil" size={16} /> },
          { label: "Duplicate", icon: <Icon name="Copy" size={16} /> },
          { label: "Archive", icon: <Icon name="Archive" size={16} /> },
          { separator: true },
          { label: "Delete", icon: <Icon name="Trash2" size={16} />, danger: true },
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
