<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 22px 24px; font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { font-size: var(--text-xs); font-weight: 600; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-text-subtle); width: 100%; margin-bottom: 2px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.TwicoUiDesignSystem_f2f16a;
  const Icon = window.TwicoIcon;

  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Variants</span>
          <Button variant="solid">Solid</Button>
          <Button variant="soft">Soft</Button>
          <Button variant="outline">Outline</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="danger">Danger</Button>
        </div>
        <div className="row">
          <span className="lbl">Sizes &amp; icons</span>
          <Button size="sm" leftIcon={<Icon name="Plus" size={15} />}>Small</Button>
          <Button size="md" leftIcon={<Icon name="Download" size={17} />}>Medium</Button>
          <Button size="lg" rightIcon={<Icon name="ArrowRight" size={19} />}>Large</Button>
        </div>
        <div className="row">
          <span className="lbl">States</span>
          <Button loading>Saving</Button>
          <Button variant="soft" loading>Loading</Button>
          <Button disabled>Disabled</Button>
          <Button variant="outline" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lbl">Icon buttons</span>
          <IconButton aria-label="Settings" icon={<Icon name="Settings" />} />
          <IconButton aria-label="Like" variant="soft" round icon={<Icon name="Heart" />} />
          <IconButton aria-label="Edit" variant="outline" icon={<Icon name="Pencil" />} />
          <IconButton aria-label="Add" variant="solid" round icon={<Icon name="Plus" />} />
          <IconButton aria-label="More" icon={<Icon name="EllipsisVertical" />} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
