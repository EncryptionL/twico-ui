<!-- @dsCard group="Components" viewport="700x320" name="Stepper" subtitle="Wizard progress — horizontal, vertical, error state" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stepper — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 26px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 30px; }
  .two { display: grid; grid-template-columns: 1.4fr 1fr; gap: 30px; align-items: start; }
  .lbl { font-size: var(--text-xs); font-weight: 600; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-text-subtle); margin-bottom: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Stepper } = window.TwicoUiDesignSystem_f2f16a;
  function Demo() {
    const steps = [
      { title: "Account", description: "Your details" },
      { title: "Payment", description: "Billing info" },
      { title: "Review", description: "Confirm order" },
      { title: "Done" },
    ];
    return (
      <div className="stack">
        <div>
          <div className="lbl">Horizontal · step 2 active</div>
          <Stepper active={1} steps={steps} />
        </div>
        <div className="two">
          <div>
            <div className="lbl">With error on step 3</div>
            <Stepper active={2} steps={[
              { title: "Account", description: "Complete" },
              { title: "Payment", description: "Complete" },
              { title: "Review", description: "Card declined", error: true },
              { title: "Done" },
            ]} />
          </div>
          <div>
            <div className="lbl">Vertical</div>
            <Stepper orientation="vertical" active={1} steps={steps} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
