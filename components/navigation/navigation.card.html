<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Navigation — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../../assets/twico-icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Accordion } = window.TwicoUiDesignSystem_f2f16a;
  const Icon = window.TwicoIcon;

  function Demo() {
    return (
      <div className="grid">
        <div>
          <Tabs defaultValue="overview" items={[
            { value: "overview", label: "Overview", icon: <Icon name="LayoutDashboard" size={15} />, content: <span>Project overview and key metrics at a glance.</span> },
            { value: "activity", label: "Activity", count: 8, content: <span>Recent activity feed.</span> },
            { value: "settings", label: "Settings", icon: <Icon name="Settings" size={15} />, content: <span>Configure your workspace.</span> },
          ]} />
          <div style={{ height: 18 }} />
          <Tabs variant="pill" defaultValue="day" items={[
            { value: "day", label: "Day" }, { value: "week", label: "Week" }, { value: "month", label: "Month" },
          ]} />
        </div>
        <Accordion multiple defaultOpen={["a"]} items={[
          { value: "a", label: "Is Twico UI free?", icon: <Icon name="BadgeCheck" size={17} />, content: "Yes — Twico UI is MIT licensed and free forever, including every component." },
          { value: "b", label: "Does it support dark mode?", icon: <Icon name="Moon" size={17} />, content: "Dark mode works out of the box via a single class on the root element." },
          { value: "c", label: "Can I theme the colors?", icon: <Icon name="Palette" size={17} />, content: "Every color is a CSS variable — remap the brand scale to reskin instantly." },
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
