<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Drawer — Twico UI</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--color-bg); color: var(--color-text); padding: 24px; font-family: var(--font-sans); }
  .bar { display: flex; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Drawer, Button, Input, Switch } = window.TwicoUiDesignSystem_f2f16a;
  function Demo() {
    const [side, setSide] = React.useState(null);
    return (
      <div>
        <div className="bar">
          {["left","right","top","bottom"].map((s) => (
            <Button key={s} variant={s === "right" ? "solid" : "outline"} onClick={() => setSide(s)}>Open {s}</Button>
          ))}
        </div>
        <Drawer open={!!side} side={side || "right"} onClose={() => setSide(null)}
          title="Filters" description="Refine the results below"
          footer={<><Button variant="ghost" onClick={() => setSide(null)}>Reset</Button><Button onClick={() => setSide(null)}>Apply</Button></>}>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <Input label="Keyword" placeholder="Search…" />
            <Switch label="In stock only" defaultChecked />
            <Switch label="On sale" />
          </div>
        </Drawer>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
