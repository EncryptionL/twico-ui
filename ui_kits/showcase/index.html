<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Twico UI — Free React + Tailwind components</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../assets/twico-icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .twui-app { min-height: 100vh; background: var(--color-bg); color: var(--color-text); transition: background-color var(--duration-base) var(--ease-standard), color var(--duration-base) var(--ease-standard); }
  .twui-container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 99px; border: 3px solid var(--color-bg); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Showcase.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  const { Nav, Hero, Showcase, Features, Footer } = window;

  function App() {
    const [dark, setDark] = React.useState(false);
    return (
      <div className={"twui-app" + (dark ? " dark" : "")}>
        <Nav dark={dark} onToggleDark={() => setDark((d) => !d)} />
        <Hero />
        <Showcase />
        <Features />
        <Footer />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
