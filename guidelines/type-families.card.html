<!-- @dsCard group="Type" viewport="700x200" name="Typefaces" subtitle="Plus Jakarta Sans (UI) · JetBrains Mono (code)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); color: var(--color-text); font-family: var(--font-sans); padding: 22px; }
  .row { border-bottom: 1px solid var(--color-divider); padding: 14px 0; }
  .row:last-child { border: none; }
  .meta { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-subtle); margin-bottom: 6px; }
  .sans-big { font-family: var(--font-sans); font-size: 38px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .sans-sub { font-family: var(--font-sans); font-size: 15px; color: var(--color-text-muted); margin-top: 6px; }
  .mono { font-family: var(--font-mono); font-size: 22px; font-weight: 600; }
</style>
</head>
<body>
<div class="row">
  <div class="meta">Plus Jakarta Sans · UI typeface</div>
  <div class="sans-big">The quick brown fox</div>
  <div class="sans-sub">ABCDEFGHIJKLM abcdefghijklm 0123456789 — weights 200–800</div>
</div>
<div class="row">
  <div class="meta">JetBrains Mono · Code & data</div>
  <div class="mono">const twico = "ui"; // 0123456789</div>
</div>
</body>
</html>
