<!-- @dsCard group="Type" viewport="700x130" name="Font weights" subtitle="Plus Jakarta Sans 400 → 800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); color: var(--color-text); font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .w { flex: 1; min-width: 110px; }
  .big { font-size: 30px; letter-spacing: -0.02em; line-height: 1.1; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-subtle); margin-top: 4px; }
</style>
</head>
<body>
<div class="row">
  <div class="w"><div class="big" style="font-weight:400">Aa</div><div class="lbl">400 Regular</div></div>
  <div class="w"><div class="big" style="font-weight:500">Aa</div><div class="lbl">500 Medium</div></div>
  <div class="w"><div class="big" style="font-weight:600">Aa</div><div class="lbl">600 Semibold</div></div>
  <div class="w"><div class="big" style="font-weight:700">Aa</div><div class="lbl">700 Bold</div></div>
  <div class="w"><div class="big" style="font-weight:800">Aa</div><div class="lbl">800 Extrabold</div></div>
</div>
</body>
</html>
