<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Indigo" subtitle="Primary scale 50–950. Remap --brand-* to reskin the whole library." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-sans); padding: 20px; }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .sw { border-radius: var(--radius-md); height: 64px; display: flex; align-items: flex-end; padding: 6px; box-shadow: var(--shadow-xs); }
  .cap { font-size: 10px; font-weight: 600; color: var(--color-text-muted); text-align: center; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .step { display: flex; flex-direction: column; }
  .lb { font-size: 10px; font-weight: 700; }
</style>
</head>
<body>
<div class="scale" id="s"></div>
<script>
  const steps = [50,100,200,300,400,500,600,700,800,900,950];
  const s = document.getElementById('s');
  steps.forEach(n => {
    const wrap = document.createElement('div'); wrap.className = 'step';
    const sw = document.createElement('div'); sw.className = 'sw';
    sw.style.background = `var(--indigo-${n})`;
    const lb = document.createElement('span'); lb.className = 'lb';
    lb.style.color = n >= 400 ? '#fff' : 'var(--indigo-900)';
    lb.textContent = n === 500 ? '★' : '';
    sw.appendChild(lb);
    const cap = document.createElement('div'); cap.className = 'cap'; cap.textContent = n;
    wrap.appendChild(sw); wrap.appendChild(cap); s.appendChild(wrap);
  });
</script>
</body>
</html>
