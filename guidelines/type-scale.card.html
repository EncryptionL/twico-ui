<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Display → caption — the modular scale in use" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); color: var(--color-text); font-family: var(--font-sans); padding: 22px; }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-subtle); width: 110px; flex: none; }
  .samp { font-weight: 700; letter-spacing: -0.02em; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="line"><span class="tok">4xl · 36/700</span><span class="samp" style="font-size:var(--text-4xl)">Build faster</span></div>
  <div class="line"><span class="tok">3xl · 30/700</span><span class="samp" style="font-size:var(--text-3xl)">Ship beautiful UIs</span></div>
  <div class="line"><span class="tok">2xl · 24/700</span><span class="samp" style="font-size:var(--text-2xl)">Composable components</span></div>
  <div class="line"><span class="tok">xl · 20/600</span><span class="samp" style="font-size:var(--text-xl);font-weight:600">Section heading</span></div>
  <div class="line"><span class="tok">lg · 18/600</span><span class="samp" style="font-size:var(--text-lg);font-weight:600">Card title text</span></div>
  <div class="line"><span class="tok">base · 16/400</span><span class="samp" style="font-size:var(--text-base);font-weight:400;color:var(--color-text-muted)">Body copy is set at 16px with relaxed line height.</span></div>
  <div class="line"><span class="tok">sm · 14/400</span><span class="samp" style="font-size:var(--text-sm);font-weight:400;color:var(--color-text-muted)">Secondary and helper text.</span></div>
  <div class="line"><span class="tok">xs · 12/600</span><span class="samp" style="font-size:var(--text-xs);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--color-text-subtle)">Eyebrow label</span></div>
</body>
</html>
