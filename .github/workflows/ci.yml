name: CI

# Runs on the dev integration branch and on PRs into dev/main.
# Publishing is automated separately and ONLY from main (see release.yml).
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Verify JS + TS resolution (ESM + CJS exports, types)
        run: npm run check:exports

      - name: Guard - shippable stylesheet is in sync with token sources
        run: npm run build:css:check

      - name: Guard - palette.html preview is in sync with color tokens
        run: npm run verify:palette

      - name: Guard - docs hooks list is in sync with hooks/index.js
        run: node site/scripts/gen-exports.mjs --check

      - name: Guard - docs variations search index is in sync
        run: node site/scripts/gen-variations-index.mjs --check

      - name: Guard - component reference inherited-prop enrichment is in sync
        run: node site/scripts/enrich-props.mjs --check

      - name: Guard - bundle size budget
        run: npm run size

      - name: Assert "use client" banner survived bundling
        run: |
          head -1 dist/index.mjs | grep -q '"use client"' || { echo "::error::dist/index.mjs is missing the \"use client\" directive"; exit 1; }
          head -1 dist/index.cjs | grep -q '"use client"' || { echo "::error::dist/index.cjs is missing the \"use client\" directive"; exit 1; }
          echo "✓ both bundles start with \"use client\""

      - name: Guard - no CDN references in shipped source
        run: |
          if grep -rInE "(fonts\.googleapis|fonts\.gstatic|cdnjs\.cloudflare|unpkg\.com|jsdelivr\.net|esm\.sh|skypack\.dev|//cdn\.)" --include="*.jsx" --include="*.ts" --include="*.css" components src styles tokens base.css; then
            echo "::error::CDN reference found in shipped source — self-host fonts/icons/assets instead.";
            exit 1;
          fi
          echo "✓ no CDN references in shipped source"

      - name: Verify package contents
        run: npm pack --dry-run
