name: Deploy docs site

# Builds the documentation site (site/) and deploys it to GitHub Pages.
# Deploys ONLY from main (the release branch); also triggerable manually.
# `enablement: true` lets the workflow turn Pages on by itself; if that is
# blocked, enable it once under Settings -> Pages -> Source = GitHub Actions.
#
# VERSIONED DOCS: the live site is built at the root base ("/twico-ui/") and carries
# the React <VersionSelector/> in its navbar. Each released minor is ALSO rebuilt from
# its git tag into a frozen snapshot under "/twico-ui/v<minor>/", and the standalone
# version-switcher.js is injected into those snapshots (their tags predate the React
# selector). Both read /twico-ui/versions.json. See docs/docs-site.md.
on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "components/**"
      - "src/**"
      - "styles/**"
      - "tokens/**"
      - "base.css"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # The site build never needs Playwright browsers; skip the heavy download on every
  # `npm ci` (latest + one per snapshot).
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
  # Frozen documentation snapshots, "<base-version>=<git tag>", newest first. Patches
  # share their minor's docs (point at the latest patch tag). Keep this matched to the
  # snapshot entries in site/public/versions.json — only the latest ~2 prior minors, so
  # the version switcher stays short and we don't rebuild ancient docs on every deploy.
  DOC_SNAPSHOTS: "1.14=v1.14.0 1.13=v1.13.0"

jobs:
  build:
    name: Build site (+ version snapshots)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags so the version snapshots can be built from old tags.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Build latest (root base)
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Build version snapshots
        run: |
          set -uo pipefail
          DIST="$GITHUB_WORKSPACE/site/dist"
          for pair in $DOC_SNAPSHOTS; do
            ver="${pair%%=*}"
            tag="${pair##*=}"
            echo "::group::docs snapshot v$ver (from $tag)"
            wt="$RUNNER_TEMP/docs-$ver"
            # Build the snapshot in an isolated worktree. A single old-tag build failure
            # must NOT abort the whole deploy — warn and skip that version instead.
            if git worktree add --force "$wt" "$tag" && (
              cd "$wt/site"
              npm ci
              # Override the hard-coded base so assets resolve under the versioned path.
              npm run build -- --base="/twico-ui/v$ver/" --outDir "$DIST/v$ver" --emptyOutDir
            ); then
              # Tags before the React <VersionSelector/> (<= v1.2) need the standalone
              # switcher injected; newer tags already ship it, so skip to avoid a duplicate.
              if [ ! -f "$wt/site/src/components/VersionSelector.jsx" ]; then
                sed -i 's#</body>#<script src="/twico-ui/version-switcher.js" defer></script></body>#' "$DIST/v$ver/index.html"
              fi
            else
              echo "::warning title=docs snapshot v$ver::build from $tag failed — skipping this version"
            fi
            git worktree remove --force "$wt" 2>/dev/null || true
            echo "::endgroup::"
          done
          echo "Deployed doc tree:"
          ls -1 "$DIST"

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
