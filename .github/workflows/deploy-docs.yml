name: Deploy docs site

# Builds the documentation site (site/) and deploys it to GitHub Pages.
# Deploys ONLY from main (the release branch); also triggerable manually.
# `enablement: true` lets the workflow turn Pages on by itself; if that is
# blocked, enable it once under Settings -> Pages -> Source = GitHub Actions.
on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "components/**"
      - "src/**"
      - "styles/**"
      - "tokens/**"
      - "base.css"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
