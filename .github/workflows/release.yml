name: Release

# Fully automated semantic versioning. On every push to main, semantic-release
# reads the Conventional Commits since the last release, computes the next
# version (fix -> patch, feat -> minor, feat!/BREAKING CHANGE -> major),
# publishes to npm, tags vX.Y.Z, updates CHANGELOG.md + package.json, and
# creates a GitHub Release. No manual version bumps. If no release-worthy
# commits are present, it does nothing.
on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # tags, GitHub release, and the changelog/version commit back to main
  issues: write # semantic-release release comments
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so commit analysis can find the last release
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
