name: Visual regression

# Playwright pixel-diff of the key docs-site pages, in light + dark.
# Baselines are OS-sensitive, so they are generated on THIS Linux runner:
#   1. Run this workflow manually with mode=update (once, and after intentional
#      visual changes). Download the "updated-baselines" artifact and commit the
#      PNGs under site/tests/__screenshots__/.
#   2. Thereafter every PR touching the UI runs mode=compare and uploads a diff
#      report artifact on mismatch.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "compare (assert) or update (regenerate baselines)"
        type: choice
        default: compare
        options: [compare, update]
  pull_request:
    branches: [dev, main]
    paths:
      - "site/**"
      - "components/**"
      - "styles/**"
      - "tokens/**"
      - "base.css"

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  visual:
    name: Pixel diff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json
      - name: Install site deps
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build site
        run: npm run build
      - name: Run visual tests
        run: npm run ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'update') && 'test:visual:update' || 'test:visual' }}
      - name: Upload updated baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'update' }}
        uses: actions/upload-artifact@v4
        with:
          name: updated-baselines
          path: site/tests/__screenshots__/
      - name: Upload diff report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 14
