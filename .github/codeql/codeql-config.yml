name: "Twico UI CodeQL config"

# Same broad query suite the workflow used before (now declared here).
queries:
  - uses: security-and-quality

# Exclude GENERATED artifacts from analysis. These files are produced by build
# scripts and must never be hand-edited (see CLAUDE.md §1 / §5), so CodeQL
# findings inside them are not actionable. The GENERATORS themselves are still
# analyzed, so any real issue is caught at its source.
paths-ignore:
  - "_ds_bundle.js"        # generated by the design-system bundler (_ds_manifest.json + SKILL.md)
  - "src/brand-icons.tsx"  # generated by scripts/fetch-brand-icons.mjs + scripts/gen-brand-icons.mjs
