name: "Twico UI CodeQL config"

# Same broad query suite the workflow used before (now declared here).
queries:
  - uses: security-and-quality

# Exclude files whose CodeQL findings are not actionable:
#  - GENERATED artifacts: produced by build scripts and never hand-edited (see
#    CLAUDE.md §1 / §5). The GENERATORS themselves are still analyzed, so any
#    real issue is caught at its source.
#  - The dev-only icon-vendoring script: its sole purpose is "network -> file"
#    (an inherent js/http-to-file-access pattern). It is not shipped in the npm
#    tarball, not run in CI, and not part of the docs site; its committed output
#    (scripts/brand-icons.json) is code-reviewed. It is still hardened in code
#    with a strict SVG-path allowlist + printable-ASCII title sanitization.
paths-ignore:
  - "_ds_bundle.js"                  # generated by the design-system bundler (_ds_manifest.json + SKILL.md)
  - "src/brand-icons.tsx"            # generated by scripts/fetch-brand-icons.mjs + scripts/gen-brand-icons.mjs
  - "scripts/fetch-brand-icons.mjs"  # dev-only network->file icon vendoring (js/http-to-file-access), output committed + reviewed
