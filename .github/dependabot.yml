version: 2
updates:
  # Library build/release toolchain
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # TypeScript 7.x is the native (Go) compiler; its programmatic API is not yet
      # compatible with tsup's DTS generation (rollup-plugin-dts) — the build crashes with
      # "Cannot read properties of undefined (reading 'useCaseSensitiveFileNames')" (#199).
      # Keep on the 5.x line until the native compiler's API stabilizes for build tooling.
      - dependency-name: "typescript"
        versions: [">=7.0.0"]

  # Documentation site
  - package-ecosystem: "npm"
    directory: "/site"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
